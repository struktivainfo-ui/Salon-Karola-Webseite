<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta http-equiv="refresh" content="0; url=https://salon-karola-crm.onrender.com/qr-kundenkarte" />
    <title>Digitale Kundenkarte | Salon Karola</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050203;
        --panel: rgba(22, 8, 15, 0.88);
        --cream: #fff4d8;
        --muted: rgba(255, 244, 216, 0.76);
        --gold: #f3cf66;
        --pink: #f69ac7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 24% 24%, rgba(246, 154, 199, 0.22), transparent 34%),
          radial-gradient(circle at 74% 70%, rgba(243, 207, 102, 0.16), transparent 34%),
          var(--bg);
        color: var(--cream);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        width: min(100%, 520px);
        padding: clamp(28px, 7vw, 44px);
        border: 1px solid rgba(246, 154, 199, 0.36);
        border-radius: 28px;
        background: linear-gradient(145deg, var(--panel), rgba(5, 2, 3, 0.94));
        box-shadow: 0 22px 70px rgba(246, 154, 199, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(1.65rem, 7vw, 2.35rem);
        line-height: 1.05;
        color: var(--cream);
        text-shadow:
          0 0 12px rgba(243, 207, 102, 0.42),
          0 0 26px rgba(246, 154, 199, 0.2);
      }

      p {
        margin: 0 auto 24px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 22px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ffe59b, #f69ac7);
        color: #16070d;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 0 24px rgba(246, 154, 199, 0.26);
      }

      a:focus-visible {
        outline: 3px solid rgba(255, 244, 216, 0.9);
        outline-offset: 4px;
      }
    </style>
    <script>
      window.location.replace("https://salon-karola-crm.onrender.com/qr-kundenkarte");
    </script>
  </head>
  <body>
    <main>
      <h1>Digitale Kundenkarte</h1>
      <p>Sie werden zur digitalen Kundenkarte von Salon Karola weitergeleitet ...</p>
      <a href="https://salon-karola-crm.onrender.com/qr-kundenkarte">Jetzt zur Kundenkarte</a>
    </main>
  </body>
</html>
